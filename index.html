<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Book an Appointment</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0f14;
      color: #e8eaf0;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6ee7b7;
      font-weight: 500;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 48px;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    h1 em {
      font-style: italic;
      color: #a78bfa;
    }

    .desc {
      font-size: 14px;
      color: #7c8099;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .card {
      background: #161820;
      border: 1px solid #2a2d3e;
      border-radius: 20px;
      padding: 40px 32px;
      margin-bottom: 16px;
    }

    .result {
      background: #161820;
      border: 1px solid #6ee7b7;
      border-radius: 16px;
      padding: 24px;
      display: none;
      text-align: left;
      animation: fadeUp .3s ease;
    }

    .result.show {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
      }
    }

    .result-title {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6ee7b7;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2d3e;
      font-size: 14px;
    }

    .result-row:last-child {
      border: none;
    }

    .result-key {
      color: #7c8099;
    }

    .result-val {
      font-weight: 500;
    }

    .result-id {
      color: #6ee7b7;
    }

    .footer {
      font-size: 11px;
      color: #3a3d52;
      margin-top: 24px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="eyebrow">AI Voice Assistant</div>
    <h1>Book your<br /><em>appointment</em></h1>
    <p class="desc">Speak to the agent — give your name, preferred date, time and phone number.</p>

    <div class="">
      <elevenlabs-convai agent-id="agent_7001kt1j05xqehtryzh9msmw3sqc"></elevenlabs-convai>
      <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
    </div>

    <div class="result" id="result">
      <div class="result-title">✓ Appointment confirmed</div>
      <div id="result-rows"></div>
    </div>

    <div class="footer">Powered by ElevenLabs · Workflow by n8n</div>
  </div>

  
  <script>
    // ── paste your n8n production webhook URL here ──
    const N8N_WEBHOOK = 'https://removed-humility-contusion.ngrok-free.devhttp:/webhook/latest-booking';

    widget.addEventListener('call-end', async () => {
  try {
    const res  = await fetch('https://removed-humility-contusion.ngrok-free.devhttp:/webhook/latest-booking');
    const data = await res.json();
    // Postgres returns an array — grab first row
    const row  = Array.isArray(data) ? data[0] : data;
    if (row) showResult(row);
  } catch (err) {
    console.error('Error fetching booking:', err);
  }
});

    function showResult(data) {
      const d = data.data || data;
      const appt = d.appointment_time ? new Date(d.appointment_time) : null;

      const rows = [
        ['Booking ID', d.booking_id || d.id],
        ['Email', d.customer_email],
        ['Date', appt ? appt.toLocaleDateString('en-IN', { dateStyle: 'long' }) : null],
        ['Time', appt ? appt.toLocaleTimeString('en-IN', { timeStyle: 'short' }) : null],
        ['Status', d.status],
      ].filter(([, v]) => v);

      document.getElementById('result-rows').innerHTML = rows
        .map(([k, v]) => `
        <div class="result-row">
          <span class="result-key">${k}</span>
          <span class="result-val ${k === 'Booking ID' ? 'result-id' : ''}">${v}</span>
        </div>`
        ).join('');

      document.getElementById('result').classList.add('show');
    }
  </script>
</body>

</html>
